<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#000000" rx="4"/>

  <!-- Dendrite branches radiating from soma -->
  <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round">
    <line x1="16" y1="11" x2="16" y2="2.5"/>
    <line x1="19.5" y1="12.5" x2="27.5" y2="5.5"/>
    <line x1="20.5" y1="18" x2="29" y2="22.5"/>
    <line x1="16" y1="21" x2="13" y2="29.5"/>
    <line x1="11.5" y1="18" x2="3" y2="22.5"/>
    <line x1="12.5" y1="12.5" x2="4.5" y2="5.5"/>
  </g>

  <!-- Synaptic terminal knobs -->
  <g fill="#ffffff">
    <circle cx="16"   cy="2"    r="1.6"/>
    <circle cx="28"   cy="5"    r="1.4"/>
    <circle cx="29.5" cy="23"   r="1.4"/>
    <circle cx="13"   cy="30"   r="1.4"/>
    <circle cx="2.5"  cy="23"   r="1.4"/>
    <circle cx="4"    cy="5"    r="1.4"/>
  </g>

  <!-- Soma (cell body) -->
  <circle cx="16" cy="16" r="5" fill="#ffffff"/>
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="2" fill="#000000"/>
</svg>
